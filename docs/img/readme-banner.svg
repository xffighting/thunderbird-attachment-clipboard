<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f5c5c"/>
      <stop offset="1" stop-color="#1a8c8c"/>
    </linearGradient>
    <linearGradient id="clip" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e6f4f4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.2" r="0.7">
      <stop offset="0" stop-color="#ffd24a" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#ffd24a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- Decorative dots -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="120" cy="60" r="3"/>
    <circle cx="180" cy="180" r="2"/>
    <circle cx="220" cy="300" r="3"/>
    <circle cx="1080" cy="80" r="3"/>
    <circle cx="1140" cy="220" r="2"/>
    <circle cx="1180" cy="320" r="3"/>
    <circle cx="80" cy="220" r="2"/>
  </g>

  <!-- Big clipboard icon on the left -->
  <g transform="translate(80,80)">
    <rect width="220" height="220" rx="32" fill="url(#clip)"/>
    <!-- clipboard inner card -->
    <rect x="28" y="40" width="164" height="160" rx="14" fill="#ffffff" stroke="#cfe6e6" stroke-width="2"/>
    <!-- clip tab -->
    <rect x="78" y="20" width="64" height="32" rx="10" fill="#0f5c5c"/>
    <circle cx="110" cy="36" r="6" fill="#ffc640"/>
    <!-- paperclip "C" -->
    <g transform="translate(110,120)" stroke="#ffc640" stroke-width="9" fill="none" stroke-linecap="round">
      <path d="M -28 -22 A 30 30 0 1 0 -28 22"/>
      <line x1="-28" y1="-12" x2="-28" y2="12"/>
    </g>
  </g>

  <!-- Right-side wordmark + tagline -->
  <g transform="translate(360,0)">
    <text x="0" y="120" font-size="60" font-weight="800" fill="#ffffff" letter-spacing="-1">AttachClip</text>
    <text x="0" y="160" font-size="22" font-weight="500" fill="#cde6e6">for Thunderbird</text>
    <text x="0" y="220" font-size="22" fill="#ffffff" opacity="0.95">Right-click any attachment → Cmd+V anywhere as a real file.</text>
    <text x="0" y="252" font-size="22" font-weight="600" fill="#ffc640">Finder · WeChat · DingTalk · Lark · Slack · new email</text>

    <!-- Badge row -->
    <g transform="translate(0,288)">
      <g transform="translate(0,0)">
        <rect width="148" height="38" rx="19" fill="rgba(255,255,255,0.18)" stroke="#ffffff" stroke-width="1"/>
        <text x="74" y="24" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">macOS 12+</text>
      </g>
      <g transform="translate(160,0)">
        <rect width="180" height="38" rx="19" fill="rgba(255,255,255,0.18)" stroke="#ffffff" stroke-width="1"/>
        <text x="90" y="24" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">Thunderbird 128+</text>
      </g>
      <g transform="translate(352,0)">
        <rect width="148" height="38" rx="19" fill="rgba(255,255,255,0.18)" stroke="#ffffff" stroke-width="1"/>
        <text x="74" y="24" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">Manifest V3</text>
      </g>
      <g transform="translate(512,0)">
        <rect width="172" height="38" rx="19" fill="rgba(255,255,255,0.18)" stroke="#ffffff" stroke-width="1"/>
        <text x="86" y="24" font-size="13" fill="#ffffff" font-weight="600" text-anchor="middle">No telemetry. No upload.</text>
      </g>
    </g>
  </g>
</svg>